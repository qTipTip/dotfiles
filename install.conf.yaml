- create:
  - ~/.config

- clean:
    ~/:
      force: true
    ~/.config:
      recursive: true
  
- link:
    ~/.config/nvim:
        force: true
        path: nvim

    ~/.config/zellij:
        create: true
        path: zellij

    ~/.config/omf:
        create: false
        path: omf

- shell:
  - 
    command: sudo apt install fish
    stdin: true
    stdout: true
    description: Install the fish-shell
  - 
    command: chsh -s $(which fish)
    stdin: true
    stdout: true
    description: Change default shell to fish 
  -
    command: curl https://raw.githubusercontent.com/oh-my-fish/oh-my-fish/master/bin/install | fish
    stdin: false
    stdout: true
    description: Download oh-my-fish and run the installer
  -
    command: omf install https://github.com/jhillyerd/plugin-git
    stdin: false
    stdout: true
    description: Install the fish git-plugin
  -
    command: git clone https://github.com/arcticicestudio/nord-gnome-terminal.git && cd nord-gnome-terminal/src && ./nord.sh && cd .. && rm -r nord-gnome-terminal/
    stdin: false
    stdout: true
    description: Clone nord-gnome-terminal, execute, then remove folder
  -
    command: sudo apt install fonts-powerline
    stdin: true
    stdout: true
    description: Install powerline compatible fonts. Remember to select it in the terminal! 

