- create:
  - ~/.config

- clean:
    ~/:
      force: true
    ~/.config:
      recursive: true
  
- link:
    ~/.config/fish:
        force: true
        path: fish
    ~/.config/nvim:
        force: true
        path: nvim
    ~/.config/zellij:
        create: true
        path: zellij
    ~/.config/omf:
        create: false
        path: omf
    ~/.config/kitty:
        create: true
        path: kitty
        force: true
    ~/.config/k9s:
        create: true
        path: k9s
        force: true
    ~/.config/yabai:
        create: true
        path: yabai
        force: true
    ~/.config/spacebar:
        create: true
        path: spacebar
        force: true

- shell:
  - command: |
      curl -L https://sw.kovidgoyal.net/kitty/installer.sh | sh /dev/stdin
    stdin: true
    stdout: true
    description: Install the kitty-terminal
  - 
    command: |
      if [ "$(uname -s)" = "Linux" ]; then
            sudo ap install fish
      else
            brew install fish
      fi
    stdin: true
    stdout: true
    description: Install the fish-shell
  - 
    command: chsh -s $(which fish)
    stdin: true
    stdout: true
    description: Change default shell to fish 
  -
    command: curl https://raw.githubusercontent.com/oh-my-fish/oh-my-fish/master/bin/install | fish
    stdin: false
    stdout: true
    description: Download oh-my-fish and run the installer
  -
    command: omf install https://github.com/jhillyerd/plugin-git
    stdin: false
    stdout: true
    description: Install the fish git-plugin
  -
    command: |
      if [ "$(uname -s)" = "Linux" ]; then
        sudo apt install fonts-powerline
      fi
    stdin: true
    stdout: true
    description: Install powerline compatible fonts. Remember to select it in the terminal! 
